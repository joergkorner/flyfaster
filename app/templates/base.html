<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ brand }}{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chivo:wght@400;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="vario-tape" aria-hidden="true"></div>
<header class="site">
  <a class="brand" href="/">{{ brand }}</a>
  <nav><a class="btn btn-small" href="/#upload">Get your reports</a></nav>
</header>
<main>
{% block content %}{% endblock %}
</main>
<footer class="site">
  <p>v{{ version }} · Free while in beta · uploaded tracks are deleted after processing ·
  <a href="https://github.com/" rel="noopener">source on GitHub</a></p>
</footer>
</body>
</html>
